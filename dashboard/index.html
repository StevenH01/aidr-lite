<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIDR-Lite — Live Event Feed</title>
  <style>
    /* ---- Reset & base ----------------------------------------------- */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      font-size: 14px;
      display: flex;
      flex-direction: column;
    }

    /* ---- Header ----------------------------------------------------- */
    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    h1 {
      font-size: 18px;
      font-weight: 600;
      color: #f0f6fc;
    }
    h1 .subtitle {
      font-size: 12px;
      font-weight: 400;
      color: #8b949e;
      margin-left: 8px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 12px;
      background: #21262d;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #6e7681;
    }
    .status.connected .status-dot { background: #3fb950; box-shadow: 0 0 6px #3fb950; }
    .status.error    .status-dot { background: #f85149; }

    .stats {
      margin-left: auto;
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: #8b949e;
    }
    .stats span b { color: #c9d1d9; font-weight: 600; }

    button, select, input {
      font-family: inherit;
      font-size: 12px;
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 5px 10px;
      cursor: pointer;
    }
    button:hover { background: #30363d; }
    input { cursor: text; }

    /* ---- Toolbar ---------------------------------------------------- */
    .toolbar {
      background: #0d1117;
      border-bottom: 1px solid #30363d;
      padding: 8px 20px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .toolbar label { font-size: 12px; color: #8b949e; }

    /* ---- Event table ------------------------------------------------ */
    .table-wrap { flex: 1; overflow-y: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-family: "SF Mono", Consolas, "Courier New", monospace;
      font-size: 12px;
    }
    thead {
      position: sticky;
      top: 0;
      background: #161b22;
      z-index: 10;
    }
    th {
      text-align: left;
      padding: 8px 12px;
      font-weight: 600;
      color: #8b949e;
      border-bottom: 1px solid #30363d;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.5px;
    }
    td {
      padding: 6px 12px;
      border-bottom: 1px solid #21262d;
      vertical-align: top;
    }
    tbody tr:hover { background: #161b22; }
    tbody tr.new { animation: highlight 1.5s ease-out; }
    @keyframes highlight {
      from { background: #1f6feb40; }
      to   { background: transparent; }
    }

    /* Event-type badge colors ----------------------------------------- */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .badge.auth        { background: #1f6feb33; color: #58a6ff; }
    .badge.process     { background: #d29922cc; color: #fff; }
    .badge.network     { background: #7ee78733; color: #7ee787; }
    .badge.filesystem  { background: #f8514933; color: #ff7b72; }
    .badge.persistence { background: #bc8cff33; color: #bc8cff; }

    .raw-toggle {
      cursor: pointer;
      color: #58a6ff;
      font-size: 11px;
    }
    .raw-toggle:hover { text-decoration: underline; }
    .raw-content {
      display: none;
      background: #010409;
      padding: 8px;
      margin-top: 6px;
      border-radius: 4px;
      white-space: pre-wrap;
      word-break: break-all;
      color: #8b949e;
    }
    .raw-content.show { display: block; }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #8b949e;
    }

    /* Modal for API key prompt ---------------------------------------- */
    .modal-bg {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    .modal {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 24px;
      width: 400px;
      max-width: 90%;
    }
    .modal h2 { font-size: 16px; margin-bottom: 8px; color: #f0f6fc; }
    .modal p  { font-size: 13px; color: #8b949e; margin-bottom: 16px; }
    .modal input {
      width: 100%; padding: 8px 12px; margin-bottom: 12px;
      font-family: "SF Mono", Consolas, monospace;
    }
    .modal button {
      width: 100%; padding: 8px; background: #238636; color: #fff;
      border-color: #2ea043; font-weight: 600;
    }
    .modal button:hover { background: #2ea043; }
  </style>
</head>
<body>

  <header>
    <h1>AIDR-Lite <span class="subtitle">Live Event Feed</span></h1>
    <span id="status" class="status">
      <span class="status-dot"></span>
      <span id="status-text">Disconnected</span>
    </span>
    <div class="stats">
      <span>Total: <b id="stat-total">0</b></span>
      <span>Rate: <b id="stat-rate">0</b>/s</span>
      <span>Buffer: <b id="stat-buffer">0</b></span>
    </div>
  </header>

  <div class="toolbar">
    <label>Filter:</label>
    <select id="filter-type">
      <option value="">all event types</option>
      <option value="auth">auth</option>
      <option value="process">process</option>
      <option value="network">network</option>
      <option value="filesystem">filesystem</option>
      <option value="persistence">persistence</option>
    </select>
    <button id="btn-pause">⏸ Pause</button>
    <button id="btn-clear">🗑 Clear</button>
    <button id="btn-reset-key" style="margin-left:auto">🔑 Reset key</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:170px">Timestamp</th>
          <th style="width:100px">Type</th>
          <th style="width:140px">Host</th>
          <th style="width:160px">Action</th>
          <th>Detail</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="5" class="empty-state">Waiting for events…</td></tr>
      </tbody>
    </table>
  </div>

  <!-- API key prompt -->
  <div id="key-modal" class="modal-bg" style="display:none">
    <div class="modal">
      <h2>API Key Required</h2>
      <p>Enter the <code>BACKEND_API_KEY</code> from your <code>.env</code> file. Stored in your browser's localStorage.</p>
      <input type="password" id="key-input" placeholder="API key" autocomplete="off" />
      <button id="key-submit">Connect</button>
    </div>
  </div>

  <script>
    // ============================================================
    //  State
    // ============================================================
    const state = {
      apiKey: localStorage.getItem("aidr_api_key") || "",
      paused: false,
      filter: "",
      total: 0,
      eventTimes: [],   // for rate calculation, sliding window of timestamps
      eventSource: null,
    };

    // ============================================================
    //  API key handling
    // ============================================================
    const keyModal = document.getElementById("key-modal");
    const keyInput = document.getElementById("key-input");
    const keySubmit = document.getElementById("key-submit");

    function promptForKey() {
      keyModal.style.display = "flex";
      keyInput.focus();
    }
    keySubmit.addEventListener("click", () => {
      const v = keyInput.value.trim();
      if (!v) return;
      state.apiKey = v;
      localStorage.setItem("aidr_api_key", v);
      keyModal.style.display = "none";
      connect();
    });
    keyInput.addEventListener("keydown", e => { if (e.key === "Enter") keySubmit.click(); });

    document.getElementById("btn-reset-key").addEventListener("click", () => {
      localStorage.removeItem("aidr_api_key");
      if (state.eventSource) state.eventSource.close();
      state.apiKey = "";
      promptForKey();
    });

    // ============================================================
    //  SSE connection
    // ============================================================
    function setStatus(cls, text) {
      const el = document.getElementById("status");
      el.classList.remove("connected", "error");
      if (cls) el.classList.add(cls);
      document.getElementById("status-text").textContent = text;
    }

    function connect() {
      if (!state.apiKey) { promptForKey(); return; }

      // EventSource cannot set custom headers, so the API key goes via query
      // string. The backend endpoint /api/events/stream accepts both forms.
      const url = `/api/events/stream?api_key=${encodeURIComponent(state.apiKey)}`;
      state.eventSource = new EventSource(url);

      state.eventSource.onopen = () => setStatus("connected", "Connected");

      state.eventSource.onmessage = (e) => {
        if (state.paused) return;
        try {
          const event = JSON.parse(e.data);
          appendEvent(event);
          state.total++;
          state.eventTimes.push(Date.now());
          updateStats();
        } catch (err) {
          console.error("bad SSE payload", err, e.data);
        }
      };

      state.eventSource.onerror = () => {
        // EventSource will auto-reconnect; if we get here the auth probably failed.
        setStatus("error", "Disconnected — check API key");
      };
    }

    // ============================================================
    //  Rendering
    // ============================================================
    const tbody = document.getElementById("tbody");
    const MAX_ROWS = 500;

    function escapeHtml(s) {
      return String(s)
        .replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;").replaceAll("'", "&#39;");
    }

    function fmtTime(iso) {
      const d = new Date(iso);
      return d.toLocaleTimeString("en-US", { hour12: false }) +
             "." + String(d.getMilliseconds()).padStart(3, "0");
    }

    function appendEvent(event) {
      // Apply current filter
      if (state.filter && event.event_type !== state.filter) return;

      // Remove the empty-state row if present
      const empty = tbody.querySelector(".empty-state");
      if (empty) tbody.innerHTML = "";

      const tr = document.createElement("tr");
      tr.classList.add("new");

      const rawJson = JSON.stringify(event.raw, null, 2);
      const rawId = "raw-" + Math.random().toString(36).slice(2);

      tr.innerHTML = `
        <td>${escapeHtml(fmtTime(event.ts))}</td>
        <td><span class="badge ${escapeHtml(event.event_type)}">${escapeHtml(event.event_type)}</span></td>
        <td>${escapeHtml(event.host_id)}</td>
        <td>${escapeHtml(event.action)}</td>
        <td>
          <span class="raw-toggle" data-target="${rawId}">show raw</span>
          <pre class="raw-content" id="${rawId}">${escapeHtml(rawJson)}</pre>
        </td>
      `;

      // Newest at top
      tbody.insertBefore(tr, tbody.firstChild);

      // Cap row count to keep the DOM cheap
      while (tbody.children.length > MAX_ROWS) {
        tbody.removeChild(tbody.lastChild);
      }

      // Wire raw toggle
      tr.querySelector(".raw-toggle").addEventListener("click", (e) => {
        const target = document.getElementById(e.target.dataset.target);
        target.classList.toggle("show");
        e.target.textContent = target.classList.contains("show") ? "hide raw" : "show raw";
      });

      document.getElementById("stat-buffer").textContent = tbody.children.length;
    }

    // ============================================================
    //  Stats — rate (events/sec over the last 10s)
    // ============================================================
    function updateStats() {
      document.getElementById("stat-total").textContent = state.total;
      const cutoff = Date.now() - 10_000;
      state.eventTimes = state.eventTimes.filter(t => t > cutoff);
      const rate = (state.eventTimes.length / 10).toFixed(1);
      document.getElementById("stat-rate").textContent = rate;
    }
    setInterval(updateStats, 1000);

    // ============================================================
    //  Toolbar wiring
    // ============================================================
    document.getElementById("filter-type").addEventListener("change", (e) => {
      state.filter = e.target.value;
    });
    document.getElementById("btn-pause").addEventListener("click", (e) => {
      state.paused = !state.paused;
      e.target.textContent = state.paused ? "▶ Resume" : "⏸ Pause";
    });
    document.getElementById("btn-clear").addEventListener("click", () => {
      tbody.innerHTML = '<tr><td colspan="5" class="empty-state">Waiting for events…</td></tr>';
      document.getElementById("stat-buffer").textContent = "0";
    });

    // ============================================================
    //  Boot
    // ============================================================
    if (state.apiKey) connect(); else promptForKey();
  </script>
</body>
</html>
